name: Release

# Automated releases driven by Conventional Commits. On every push to main,
# semantic-release inspects the commits since the last tag, decides the next
# version (feat → minor, fix → patch, BREAKING CHANGE → major), then builds,
# signs, notarizes, and publishes the app and stamps the Homebrew cask. If no
# commit warrants a release, it exits without doing anything.
on:
  push:
    branches: [main]

# Needed by semantic-release to push the tag + cask commit, create the GitHub
# Release, and comment on the released PRs/issues.
permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two releases at once; let an in-flight one finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          # semantic-release needs full history + tags to analyze commits.
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: npx semantic-release
